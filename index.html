<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <!--link rel="icon" href="https://www.google.com/favicon.ico">-->
    <style>
        /* Add your CSS styles here */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* Estilos para el menú de la derecha (segundo div) */
        header>div:last-child {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header a {
            text-decoration: none;
            color: #333;
            margin: 0 8px;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(3, auto);
            justify-content: left;
        }

        .menu div {
            border: 3px solid black;
            width: 0%;
            height: 0px;
            margin: 2px;
            border-radius: 50%;
        }

        header img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;

        }
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        h1 {
            font-size: 92px;
            display: flex;
        }
        .rojo {
            color: red;
        }
        .azul {
            color: blue;
        }
        .amarillo {
            color: yellow;
        }
        .berde {
            color: green;
        }
    </style>
</head>

<body>
    <header>
        <div>
            <nav>
                <a href="https://about.google/?fg=1&utm_source=google-ES&utm_medium=referral&utm_campaign=hp-header">Sobre
                    Google</a>
                <a
                    href="https://store.google.com/ES?utm_source=hp_header&utm_medium=google_ooo&utm_campaign=GS100042&hl=es-ES">Tienda</a>
            </nav>
        </div>

        <div>
            <nav>
                <a href="https://mail.google.com/mail/?tab=rm&ogbl">Gmail</a>
                <a href="https://www.google.com/imghp?hl=es&tab=ri&ogbl">Imágenes</a>
            </nav>

            <div class="menu">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <img src="http://picsum.photos/200" alt="">

        </div>
    </header>
    <main>
        <section>
            <h1><span class="azul">G</span><span class="rojo">o</span><span class="amarillo">o</span><span class="azul">g</span><span class="berde">l</span><span class="rojo">e</span></h1>
            <form action="https://www.google.com/search" method="get">
                <input type="text" name="q" placeholder="Buscar en Google o escribir una URL">
                <button type="submit">Buscar con Google</button>
                <button type="submit" name="btnI">Voy a tener suerte</button>
            </form>
        </section>
        <nav>
            <ul>
                <li>
                    <p>Ofrecido por Google en: </p>
                </li>
                <li><a href="#">Español</a></li>
                <li><a href="#">Català</a></li>
                <li><a href="#">Euskara</a></li>
                <li><a href="#">Galego</a></li>
            </ul>
        </nav>
    </main>
    <footer>

                href="https://www.google.com/intl/es_es/ads/?subid=ww-ww-et-g-awa-a-g_hpafoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpafooter&fg=1">Publicidad</a>
            <a
                href="https://www.google.com/services/?subid=ww-ww-et-g-awa-a-g_hpbfoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpbfooter&fg=1">Empresa</a>
            <a href="https://google.com/search/howsearchworks/?fg=1">Cómo funciona la Búsqueda</a>
